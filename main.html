<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        :root {
            --primary: #ff004c;
            --secondary: #1a1a1a;
            --accent: #0062e3;
            --track: black;
            --progress: #2856d4;
        }

        body {
            margin: 0; font-family: 'Arial Black', sans-serif;
            background: linear-gradient(#007bff, #130052);
            color: white; display: flex; flex-direction: column;
            align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        .stats { display: flex; gap: 25px; margin-top: -10px; margin-left: -45%; z-index: 10; }
        .stat {
            padding: 5px 25px; border-radius: 5px;
            text-align: center; border: 2px solid rgb(0, 0, 0);
            background: rgba(0, 0, 0, 0.877); font-size: 14px;
            transform: skewX(-10deg);
        }

        .pass-wrapper {
            flex: 1; width: 100%; overflow-x: auto; 
            display: flex; align-items: center;
            scroll-behavior: smooth; position: relative;
            padding-bottom: 80px;
        }
        .pass-wrapper::-webkit-scrollbar { display: none; }

        .pass-content {
            display: flex; gap: 40px; position: relative;
            padding: 0 50vw; align-items: flex-end; height: 350px;
            margin-left: -45%;
        }

        /* Ana Yol */
        .track-bg {
            position: absolute; bottom: 45px; left: 50vw; right: 50vw;
            height: 14px; background: var(--track); border-radius: 10px; z-index: 1;
            width: calc(100% - 100px); transform: translateX(50px);
        }
        .track-fill {
            position: absolute; top: 0; left: 0; height: 100%;
            background: linear-gradient(90deg, var(--progress), #002ca4);
            border-radius: 10px; width: 0; 
            transition: width 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.1);
            box-shadow: 0 0 15px var(--progress);
        }

        .tier {
            display: flex; flex-direction: column; align-items: center;
            position: relative; z-index: 2; width: 100px;
        }

        .reward {
            width: 120px; height: 160px;
            transform:skewX(-5deg);
            background: linear-gradient(#2c59c7,#00d5ff);
            border-radius: 12px; display: flex; align-items: center;
            box-shadow:
                inset 0 0 15px rgba(255,255,255,0.25),
                0 0 6px rgba(0,0,0,0.4);
            justify-content: center;
            margin-left: 20%;
            margin-bottom: 115px; /* Daireye yer açmak için artırıldı */
            border:2px solid #005eff;
            transition: 0.3s; font-size: 11px; text-align: center;
        }

        .reward.unlocked {
            width: 120px; height: 160px;
            transform:skewX(-5deg);
            background: #2856d4;
            border:2px solid black;
            color: white;
        }

        /* Küçültülmüş ve Yukarı Alınmış Daireler */
        .level-circle {
            width: 40px; height: 40px; border-radius: 50%;
            background: #0e0e0e; border: 3px solid black;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; z-index: 5;
            position: absolute; bottom: 32px; /* Çizginin biraz üzerinde durması için */
        }

        /* Çizgi Altındaki Puan Etiketi - Tam Orta Odaklı */
        .floating-tag {
            position: absolute; background: var(--accent); color: black;
            margin-left: -25px;
            padding: 5px 20px; border-radius: 3px; font-weight: bold;
            bottom: 5px; transform: translateX(-50%); z-index: 10;
            border: 1px solid rgb(0, 0, 0); font-size: 13px;
            transform: skew(-5deg);
            transition: left 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.1);
        }

        .tt{ 
            display: flex; gap: 20px; margin-bottom: 40px; 
            width: 50%; max-width: 500px; z-index: 10;
        }
        button {
            flex: 1; padding: 18px; border-radius: 18px; border: none;
            font-family: 'Arial Black'; color: white; cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.4); transition: 0.1s; font-size: 16px;
        }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }

        .btn-green { 
            background: #00c853;
            float: right;
            padding: 0px;
            margin-left: 67%; 
            margin-bottom: 8px; 
            width: 30%; 
            max-width: 500px; 
            z-index: 10;
        }

        .btn-red { 
            background: #ff4444;
            float: right;
            padding: 0px;
            margin-left: 67%; 
            margin-bottom: 10px; 
            width: 30%; 
            max-width: 500px; 
            z-index: 10; 
        }

        .bg {
            z-index: -11;
            background: center/cover no-repeat;
            width: 100vw;
            height: 100vh;
            position: absolute;
        }
    </style>
</head>
<body>
<!--<img src="images/pass/Beta_Background.webp" alt="" class="bg">-->

<div class="stats">
    <div class="stat"><div id="dogru" style="margin-top: 35%;">0</div></div>
    <div class="stat"><div id="yanlis" style="margin-top: 35%;">0</div></div>
</div>

<div class="pass-wrapper">
    <div class="pass-content" id="passContent">
        <div id="statusTag" class="floating-tag">0/5</div>
        <div class="track-bg">
            <div class="track-fill" id="trackFill"></div>
        </div>
    </div>
</div>

<button class="btn-green" onclick="ekle(1)">+1 PUAN</button>
<button class="btn-red" onclick="ekle(-1)">-1 PUAN</button>
</body>
</html>
