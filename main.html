<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pass</title>

<style>

:root{
--track:black;
--progress:#2856d4;
--accent:#0062e3;
}

body{
margin:0;
font-family:'Arial Black',sans-serif;
background:linear-gradient(#007bff,#130052);
color:white;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
overflow-x:hidden;
}

.stats{
display:flex;
gap:20px;
margin-top:10px;
z-index:10;
}

.stat{
padding:5px 25px;
border-radius:5px;
text-align:center;
border:2px solid black;
background:rgba(0,0,0,0.85);
font-size:14px;
transform:skewX(-10deg);
}

.pass-wrapper{
width:100%;
overflow-x:auto;
display:flex;
align-items:center;
scroll-behavior:smooth;
padding-bottom:90px;
}

.pass-wrapper::-webkit-scrollbar{
display:none;
}

.pass-content{
display:flex;
gap:40px;
position:relative;
align-items:flex-end;
height:350px;
padding:0 40vw;
}

.track-bg{
position:absolute;
bottom:45px;
left:0;
height:14px;
background:var(--track);
border-radius:10px;
width:100%;
}

.track-fill{
position:absolute;
top:0;
left:0;
height:100%;
background:linear-gradient(90deg,var(--progress),#002ca4);
border-radius:10px;
width:0;
transition:0.4s;
box-shadow:0 0 15px var(--progress);
}

.tier{
display:flex;
flex-direction:column;
align-items:center;
position:relative;
z-index:2;
width:100px;
}

.reward{
width:120px;
height:160px;
transform:skewX(-5deg);
background:linear-gradient(#2c59c7,#00d5ff);
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:115px;
border:2px solid #005eff;
font-size:11px;
text-align:center;
padding:5px;
}

.reward.unlocked{
background:#2856d4;
border:2px solid black;
color:white;
}

.level-circle{
width:40px;
height:40px;
border-radius:50%;
background:#0e0e0e;
border:3px solid black;
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
position:absolute;
bottom:32px;
}

.floating-tag{
position:absolute;
background:var(--accent);
color:black;
padding:5px 20px;
border-radius:3px;
font-weight:bold;
bottom:5px;
transform:translateX(-50%) skew(-5deg);
z-index:10;
border:1px solid black;
font-size:13px;
}

button{
padding:14px;
border:none;
border-radius:12px;
font-family:'Arial Black';
color:white;
cursor:pointer;
margin:6px;
width:200px;
max-width:80%;
}

.btn-green{background:#00c853;}
.btn-red{background:#ff4444;}

@media(max-width:600px){

.pass-content{
gap:30px;
padding:0 60vw;
}

.reward{
width:95px;
height:130px;
font-size:10px;
}

.level-circle{
width:34px;
height:34px;
font-size:13px;
}

}

</style>
</head>

<body>

<div class="stats">
<div class="stat"><div id="dogru">0</div></div>
<div class="stat"><div id="yanlis">0</div></div>
</div>

<div class="pass-wrapper">
<div class="pass-content" id="passContent">

<div id="statusTag" class="floating-tag">0/5</div>

<div class="track-bg">
<div class="track-fill" id="trackFill"></div>
</div>

</div>
</div>

<button class="btn-green" onclick="ekle(1)">+1 PUAN</button>
<button class="btn-red" onclick="ekle(-1)">-1 PUAN</button>
</body>
</html>
